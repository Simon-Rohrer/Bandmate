<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bandmate | Passwort zurücksetzen</title>
    <meta name="description" content="Setze dein Bandmate-Passwort sicher zurück und melde dich danach wieder mit deinem neuen Passwort an.">
    <meta name="theme-color" content="#08111F" id="themeColorMeta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" id="appleStatusBarMeta">
    <meta name="apple-mobile-web-app-title" content="Bandmate">

    <script>
        (function () {
            const STORAGE_KEY = 'theme';
            const DARK_THEME_COLOR = '#08111F';
            const LIGHT_THEME_COLOR = '#F6F8FC';

            let resolvedTheme = 'dark';

            try {
                const storedTheme = localStorage.getItem(STORAGE_KEY);
                if (storedTheme === 'light' || storedTheme === 'dark') {
                    resolvedTheme = storedTheme;
                }
            } catch (error) {
                resolvedTheme = 'dark';
            }

            document.documentElement.dataset.theme = resolvedTheme;
            document.documentElement.classList.toggle('theme-dark', resolvedTheme === 'dark');
            document.documentElement.style.colorScheme = resolvedTheme;

            const themeColorMeta = document.getElementById('themeColorMeta');
            if (themeColorMeta) {
                themeColorMeta.setAttribute('content', resolvedTheme === 'dark' ? DARK_THEME_COLOR : LIGHT_THEME_COLOR);
            }

            const appleStatusBarMeta = document.getElementById('appleStatusBarMeta');
            if (appleStatusBarMeta) {
                appleStatusBarMeta.setAttribute('content', resolvedTheme === 'dark' ? 'black-translucent' : 'default');
            }
        })();
    </script>

    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/svg+xml" href="../images/branding/bandmate-logo-only.svg" id="faviconSvg">
    <link rel="apple-touch-icon" href="../images/branding/bandmate-logo-only.svg" id="appleTouchIcon">
    
    <!-- Theme-aware favicon based on system color scheme preference -->
    <script>
        function updateFavicon() {
            const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const faviconPath = isDarkMode 
                ? '../images/branding/bandmate-logo-only-dark.svg' 
                : '../images/branding/bandmate-logo-only.svg';
            
            const favicon = document.getElementById('faviconSvg');
            const appleTouchIcon = document.getElementById('appleTouchIcon');
            
            if (favicon) favicon.href = faviconPath;
            if (appleTouchIcon) appleTouchIcon.href = faviconPath;
        }
        
        // Update favicon on page load and when system preference changes
        updateFavicon();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
    </script>
    
    <link rel="stylesheet" href="../css/ui.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/landing.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="landing-active">
    <div id="toast" class="toast"></div>

    <main id="landingPage" class="landing-page active">
        <div class="landing-content">
            <header class="landing-header" style="padding: 1rem 2rem;">
                <a href="../index.html" class="landing-logo" style="text-decoration: none; display: flex; align-items: center; gap: 0.75rem;">
                    <div class="landing-logo-mark">
                        <img src="../images/branding/bandmate-logo-only-dark.svg" alt="Bandmate" style="height: 32px;">
                    </div>
                    <div class="landing-brand-copy">
                        <span class="landing-brand-title">Bandmate</span>
                        <span class="landing-brand-subtitle">Passwort sicher zurücksetzen</span>
                    </div>
                </a>
            </header>

            <section class="landing-hero" style="min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;">
                <div style="width: 100%; max-width: 500px; margin: 0 auto; background: var(--color-surface); border-radius: 22px; border: 1px solid var(--color-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden;">
                    <div style="height: 4px; background: #0ea5e9;"></div>

                    <div style="padding: 2.5rem 2rem;">
                        <div style="display: inline-flex; align-items: center; min-height: 30px; padding: 0.28rem 0.78rem; border-radius: 999px; border: 1px solid rgba(14, 165, 233, 0.28); background: rgba(14, 165, 233, 0.12); color: #7dd3fc; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;">
                            Zugang
                        </div>

                        <div style="margin-top: 1.2rem; display: grid; gap: 0.8rem;">
                            <h1 style="margin: 0; font-size: 1.85rem; line-height: 1.12; color: var(--color-text);">Neues Passwort vergeben</h1>
                            <p style="margin: 0; color: var(--color-text-secondary); font-size: 0.96rem; line-height: 1.65;">Lege jetzt dein neues Passwort fest. Danach kommst du zurück zum Login und kannst dich direkt wieder anmelden.</p>
                        </div>

                        <form id="resetPasswordForm" style="margin-top: 1.8rem; display: grid; gap: 1.2rem;">
                            <div>
                                <label for="newPassword" style="display: block; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 0.5rem;">Neues Passwort</label>
                                <input type="password" id="newPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password"
                                    style="width: 100%; padding: 0.85rem 1.1rem; border-radius: 12px; border: 1px solid var(--color-border); background: var(--color-bg-secondary); color: var(--color-text); font-size: 0.95rem; outline: none; box-sizing: border-box; transition: border-color 0.2s;">
                                <div id="resetPasswordLengthHint" style="margin-top: 0.4rem; font-size: 0.8rem; color: var(--color-text-muted);">Mindestens 6 Zeichen erforderlich</div>
                            </div>

                            <div>
                                <label for="confirmPassword" style="display: block; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 0.5rem;">Passwort bestätigen</label>
                                <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password"
                                    style="width: 100%; padding: 0.85rem 1.1rem; border-radius: 12px; border: 1px solid var(--color-border); background: var(--color-bg-secondary); color: var(--color-text); font-size: 0.95rem; outline: none; box-sizing: border-box; transition: border-color 0.2s;">
                                <div id="resetPasswordMatchHint" style="margin-top: 0.4rem; font-size: 0.8rem; color: var(--color-text-muted);">Bitte bestätige dein Passwort</div>
                            </div>

                            <div id="resetStatusBox" style="display: none; padding: 0.85rem 1rem; border-radius: 14px; border: 1px solid rgba(14, 165, 233, 0.22); background: rgba(14, 165, 233, 0.08); color: var(--color-text); font-size: 0.9rem; line-height: 1.55;"></div>

                            <button type="submit" id="resetBtn"
                                style="display: flex; align-items: center; justify-content: center; width: 100%; min-height: 52px; border: none; border-radius: 16px; background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #ffffff; font-size: 0.98rem; font-weight: 700; letter-spacing: 0.03em; cursor: pointer; box-shadow: 0 16px 38px rgba(14, 165, 233, 0.28); transition: opacity 0.2s, transform 0.2s;">
                                Passwort speichern
                            </button>
                        </form>

                        <p style="margin: 1.2rem 0 0; text-align: center; font-size: 0.88rem; color: var(--color-text-secondary);">
                            <a href="../index.html" style="color: #0ea5e9; font-weight: 700; text-decoration: none;">Zurück zum Login</a>
                        </p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/logger.js"></script>
    <script src="../js/supabase.js?v=20260407-17"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            SupabaseClient.init();

            const form = document.getElementById('resetPasswordForm');
            const resetBtn = document.getElementById('resetBtn');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const lengthHint = document.getElementById('resetPasswordLengthHint');
            const matchHint = document.getElementById('resetPasswordMatchHint');

            const setHintState = (element, message, state = '') => {
                if (!element) return;
                element.textContent = message;
                if (state === 'valid') {
                    element.style.color = '#4ade80'; /* grün */
                } else if (state === 'invalid') {
                    element.style.color = '#f87171'; /* rot */
                } else {
                    element.style.color = 'var(--color-text-muted)'; /* grau */
                }
            };

            const validatePasswords = () => {
                const pass = newPasswordInput.value;
                const conf = confirmPasswordInput.value;

                if (!pass) {
                    setHintState(lengthHint, 'Mindestens 6 Zeichen erforderlich');
                    newPasswordInput.setCustomValidity('');
                } else if (pass.length < 6) {
                    setHintState(lengthHint, 'Mindestens 6 Zeichen erforderlich', 'invalid');
                    newPasswordInput.setCustomValidity('Das Passwort muss mindestens 6 Zeichen lang sein.');
                } else {
                    setHintState(lengthHint, 'Länge ok', 'valid');
                    newPasswordInput.setCustomValidity('');
                }

                if (!conf) {
                    setHintState(matchHint, 'Bitte bestätige dein Passwort');
                    confirmPasswordInput.setCustomValidity('');
                } else if (pass !== conf) {
                    setHintState(matchHint, 'Passwörter stimmen nicht überein', 'invalid');
                    confirmPasswordInput.setCustomValidity('Die Passwörter stimmen nicht überein.');
                } else {
                    setHintState(matchHint, 'Passwörter stimmen überein', 'valid');
                    confirmPasswordInput.setCustomValidity('');
                }
            };

            newPasswordInput.addEventListener('input', validatePasswords);
            confirmPasswordInput.addEventListener('input', validatePasswords);
            validatePasswords();

            const showStatus = (message, type = 'info') => {
                const box = document.getElementById('resetStatusBox');
                if (!box) return;
                box.textContent = message;
                box.style.display = 'block';
                if (type === 'success') {
                    box.style.borderColor = 'rgba(34, 197, 94, 0.28)';
                    box.style.background = 'rgba(34, 197, 94, 0.12)';
                    box.style.color = 'var(--color-text)';
                } else if (type === 'error') {
                    box.style.borderColor = 'rgba(248, 113, 113, 0.28)';
                    box.style.background = 'rgba(248, 113, 113, 0.12)';
                    box.style.color = 'var(--color-text)';
                } else {
                    box.style.borderColor = 'rgba(14, 165, 233, 0.22)';
                    box.style.background = 'rgba(14, 165, 233, 0.08)';
                    box.style.color = 'var(--color-text)';
                }
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (newPassword !== confirmPassword) {
                    showStatus('Die Passwörter stimmen nicht überein.', 'error');
                    return;
                }

                if (newPassword.length < 6) {
                    showStatus('Das Passwort muss mindestens 6 Zeichen lang sein.', 'error');
                    return;
                }

                resetBtn.disabled = true;
                const originalText = resetBtn.textContent;
                resetBtn.textContent = 'Speichere...';

                try {
                    const sb = SupabaseClient.getClient();
                    if (!sb) throw new Error('Verbindung zu Supabase fehlgeschlagen.');

                    const { data: sessionData } = await sb.auth.getSession();
                    if (!sessionData?.session) {
                        throw new Error('Der Zurücksetzen-Link ist nicht mehr gültig oder die Sitzung ist abgelaufen.');
                    }

                    const { error } = await sb.auth.updateUser({ password: newPassword });
                    if (error) throw error;

                    await sb.auth.signOut();

                    showStatus('Passwort erfolgreich geändert. Du wirst gleich zum Login weitergeleitet...', 'success');
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 2000);
                } catch (err) {
                    console.error('Reset error:', err);
                    const rawMessage = err.message || '';
                    const translatedMessage =
                        rawMessage.toLowerCase().includes('new password should be different') ? 'Das neue Passwort muss sich vom alten Passwort unterscheiden.' :
                        rawMessage.toLowerCase().includes('same password') ? 'Das neue Passwort muss sich vom alten Passwort unterscheiden.' :
                        rawMessage.toLowerCase().includes('weak password') ? 'Das Passwort ist zu schwach. Bitte wähle ein sichereres Passwort.' :
                        rawMessage || 'Passwort konnte nicht geändert werden.';
                    showStatus(translatedMessage, 'error');
                    resetBtn.disabled = false;
                    resetBtn.textContent = originalText;
                }
            });
        });
    </script>
</body>

</html>
